<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 5px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 8px;
            background: blue;
            color: white;
            border: none;
        }

        a {
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Login Page</h2>

    <form>
        <input type="email" placeholder="Email Id" required><br>
        <input type="password" placeholder="Password" required><br>

        <button>Login</button>
    </form>

    <p>Don't have account? <a href="#">Register</a></p>
</div>

</body>
</html>
